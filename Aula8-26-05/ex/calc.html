<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="conteiner">
        <div class="screen">
            <p class="sub" id="sub"></p>
            <p class="calc" id="screen"></p>
            <p id="alert">Syntax Error</p>
            <iframe id="doom"></iframe>
        </div>
        <div id="buttons">
            <button class="orange">CE</button>
            <button class="orange">AC</button>
            <button class="beige">√</button>
            <button class="beige">%</button>
            <button class="yellow">7</button>
            <button class="yellow">8</button>
            <button class="yellow">9</button>
            <button class="yellow">÷</button>
            <button class="green">4</button>
            <button class="green">5</button>
            <button class="green">6</button>
            <button class="green">X</button>
            <button class="purple">1</button>
            <button class="purple">2</button>
            <button class="purple">3</button>
            <button class="purple">—</button>
            <button class="blue">•</button>
            <button class="blue">0</button>
            <button class="blue">=</button>
            <button class="blue">+</button>
            
            
        </div>
    </div>
    <script src="./script.js" defer></script>
</body>
</html>
