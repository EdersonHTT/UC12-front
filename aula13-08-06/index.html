<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da memoria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <main>
        <article>
            <h1>Memory Game Copa</h1>
            <p class="subT">Encontre os pares correspondentes</p>

            <div class="info">
                <div class="item">
                    <div class="bol" id="attempts">0</div>
                    Tentativas
                </div>

                <div class="item">
                    <div class="bol">
                        <div class="nu n1">
                            0
                        </div>
                        <div class="line" ></div>
                        <div class="nu n2">
                            0
                        </div>
                    </div>
                    
                    Encontradas
                </div>
            </div>

            <button class="btnTheme">
                <i class="fa-solid fa-sun sun"></i>
                <i class="fa-solid fa-moon moon"></i>
                <div></div>
            </button>
        </article>
        <a href="index.html" class="btn">Reiniciar</a>

        <section id="tableGame">
            
        </section>

    </main>

    <script src="script.js" defer></script>
</body>
</html>
